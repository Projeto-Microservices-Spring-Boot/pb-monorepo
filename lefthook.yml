pre-commit:
  commands:
    check:
      root: frontend
      run: bun format {staged_files}
      glob: '*.{js,jsx,mjs,ts,tsx,mts,css,json,md}'
      stage_fixed: true

pre-push:
  commands:
    validate:
      root: frontend
      glob: '*.{ts,tsx,js,jsx}'
      run: bun typecheck
    lint:
      root: frontend
      glob: '*.{ts,tsx,js,jsx}'
      run: bun lint
    test:
      root: frontend
      glob: '*.{ts,tsx,js,jsx}'
      run: bun test:cov
