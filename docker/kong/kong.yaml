_format_version: "3.0"

# TODO => separar as rotas públicas e privadas de cada microservice e adicionar plugin JWT onde necessário,
# TODO => configurar o plugin de  rate limit onde necessário,

services:
  - name: adm-dashboard-service
    url: http://adm-dashboard:8081
    routes:
      - name: adm-dashboard-routes
        paths: ["/adm-dashboard"]
        protocols:
          - http
        strip_path: true

  - name: community-service
    url: http://community:8083
    routes:
      - name: community-routes
        paths: ["/community"]
        protocols:
          - http
        strip_path: true

  - name: geolocalization-service
    url: http://geolocalization:8084
    routes:
      - name: geolocalization-routes
        paths: ["/geolocalization"]
        protocols:
          - http
        strip_path: true

  - name: payments-service
    url: http://payments:8085
    routes:
      - name: payments-routes
        paths: ["/payments"]
        protocols:
          - http
        strip_path: true

  - name: users-service
    url: http://users:8082
    routes:
      - name: users-public-routes
        paths:
          - /users/public # nome provisório para o path, provavelmente será apenas o nome do endpoint mesmo!
        protocols:
          - http
        strip_path: true

      - name: users-private-routes
        paths:
          - /users/private # nome provisório para o path, provavelmente será apenas o nome do endpoint mesmo!
        protocols:
          - http
        plugins:
          - name: jwt
            config:
              header_names:
                - authorization
              claims_to_verify:
                - exp
                - nbf
              key_claim_name: iss

  - name: stickers-service
    url: http://stickers:8087
    routes:
      - name: stickers-routes
        paths: ["/stickers"]
        protocols:
          - http
        strip_path: true

  - name: store-service
    url: http://store:8088
    routes:
      - name: store-routes
        paths: ["/store"]
        protocols:
          - http
        strip_path: true

consumers:
  - username: frontend
    jwt_secrets:
      # IDE lança um erro 'Missing property "secret"' se não passar o 'secret' mas o kong funciona.
      # Isso aparentemente é um bug da extensão YAML do VsCode, o mesmo acontece com o application.yaml.
      # A IA do Kong disse que não é necessário usar o 'secret' quando o algorithm é 'RS256' mas ela disse que pode deixar.
      - key: frontend-NextJs
        secret: segredo-super-secreto
        algorithm: RS256
        rsa_public_key: |
          -----BEGIN PUBLIC KEY-----
          MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA3Ga1oA1tdI+l62JKjqX9
          1a6MMNykFCssfZjaWex5Zx5ndc+IqqieVpRHDkqfoNnNm8u96ENeC776iWZ3k6q1
          WcI1qAyuzHYEWqoPJWKwBHAqGmqKCeSnRqzQZxcSNFX9U4nYCSJ0CZ4vq6TsNr07
          pdjx4GFn3HOU1CDfd8s4J8tnSCwtKtU/gFYb0IPQoHLh6DaV4X/QYnTnHSuBcZPT
          U6UWnQWqu1AbBF5UxfU93U2gR3uoy0pqUd8qQjW0Eh/uWz/HWtqFszZ1WD9mCe7L
          WEMIcspZpTc0GHOMy0o0l4FRc7Q6zPq+5/llJgem9S74Hz8EBX7+GEJ9Jhvv8HiI
          ewIDAQAB
          -----END PUBLIC KEY-----

plugins:
  - name: prometheus
    config:
      per_consumer: true
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true
      upstream_health_metrics: true

  - name: cors
    config:
      origins:
        - "http://localhost:3000" # frontend (dev)
      methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
      headers: [Accept, Content-Type, Authorization]
